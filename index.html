<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canal TV</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0d0d10; color: #eee; }
    .app { max-width: 1000px; margin: 0 auto; padding: 16px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    h1 { font-size: 1.1rem; margin: 0; }
    .badge { background: #1d1d24; padding: 4px 10px; border-radius: 999px; font-size: .8rem; }

    .player-box { position: relative; aspect-ratio: 16/9; margin-top: 12px; background: #000;
      border-radius: 10px; overflow: hidden; }
    .player-box iframe { width: 100%; height: 100%; border: 0; display: block; }

    /* capa que tapa el iframe: captura clics (evita popunders) y trae controles */
    .overlay { position: absolute; inset: 0; cursor: pointer; }
    .controls { position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 12px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,.75));
      transition: opacity .25s; display: flex; flex-direction: column; gap: 6px; }
    .player-box.oculto-controles .controls { opacity: 0; }
    .player-box.oculto-controles .overlay { cursor: none; }

    .titulo-top { position: absolute; left: 0; right: 0; top: 0; z-index: 4;
      padding: 10px 14px; font-size: .9rem; font-weight: 600; color: #fff;
      background: linear-gradient(rgba(0,0,0,.7), transparent);
      transition: opacity .25s; pointer-events: none; }
    .player-box.oculto-controles .titulo-top { opacity: 0; }

    .next-banner { position: absolute; right: 16px; bottom: 64px; z-index: 5;
      background: rgba(20,20,28,.92); color: #fff; padding: 10px 16px; border-radius: 10px;
      font-size: .95rem; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,.5);
      opacity: 0; transform: translateY(8px); pointer-events: none; transition: opacity .3s, transform .3s; }
    .next-banner.mostrar { opacity: 1; transform: translateY(0); }

    .barra { -webkit-appearance: none; appearance: none; width: 100%; height: 5px;
      border-radius: 4px; background: #555; cursor: pointer; }
    .barra::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: #3b82f6; }
    .fila { display: flex; align-items: center; gap: 12px; }
    .fila button { background: transparent; color: #fff; border: 0; font-size: 1.05rem;
      cursor: pointer; padding: 2px 4px; line-height: 1; }
    .tiempo { font-size: .8rem; color: #cdd; min-width: 92px; }
    .vol { width: 90px; }
    .spacer { flex: 1; }

    /* navegacion de capitulos: FUERA del reproductor */
    .nav-caps { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
    .nav-caps button { background: #3b82f6; color: #fff; border: 0; padding: 9px 14px;
      border-radius: 8px; cursor: pointer; font-size: .9rem; }
    .nav-caps button:disabled { background: #2a2a33; color: #777; cursor: default; }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; align-items: center; }
    .chip { background: #1d1d24; padding: 4px 10px; border-radius: 8px; font-size: .8rem; }
    select { background: #1d1d24; color: #eee; border: 1px solid #333; border-radius: 8px; padding: 6px; }
    #estado { font-size: .8rem; color: #9aa; min-height: 1.1em; margin-top: 6px; }
    .aviso { font-size: .8rem; color: #c9a227; }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 id="serie">Canal TV</h1>
      <span id="contador" class="badge">Cargando…</span>
    </header>

    <div class="player-box" id="box">
      <iframe id="player"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen referrerpolicy="origin"></iframe>

      <div class="titulo-top" id="titulo-top"></div>
      <div class="next-banner" id="next-banner">Siguiente capítulo ▶</div>

      <div class="overlay" id="overlay">
        <div class="controls" id="controls">
          <input type="range" id="prog" class="barra" min="0" max="100" value="0" step="0.1" />
          <div class="fila">
            <button id="b-play" title="Reproducir/Pausar">▶</button>
            <button id="b-back10" title="Atrasar 10s">⏪ 10</button>
            <button id="b-fwd10" title="Adelantar 10s">10 ⏩</button>
            <button id="b-mute" title="Silenciar">🔊</button>
            <input type="range" id="vol" class="vol barra" min="0" max="1" value="1" step="0.05" />
            <span class="tiempo" id="tiempo">0:00 / 0:00</span>
            <span class="spacer"></span>
            <button id="b-full" title="Pantalla completa">⛶</button>
          </div>
        </div>
      </div>
    </div>

    <!-- navegacion de capitulos, FUERA del reproductor -->
    <div class="nav-caps">
      <button id="b-prev">⏮ Anterior</button>
      <label class="chip">Episodio: <select id="sel-cap"></select></label>
      <button id="b-next">Siguiente ⏭</button>
    </div>

    <div class="chips">
      <label class="chip">Serie: <select id="sel-serie"></select></label>
      <span class="chip" id="chip-idioma">—</span>
      <label class="chip">Servidor: <select id="sel-servidor"></select></label>
      <label class="chip"><input type="checkbox" id="auto" checked /> Auto-siguiente</label>
    </div>
    <p id="estado"></p>
    <p class="aviso" id="aviso"></p>
  </main>

  <script src="data.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    const iframe = $("#player"), box = $("#box");

    let series = [];          // [{titulo, capitulos:[...]}]
    let idxSerie = 0, idxCap = 0, idxFuente = 0;
    let userscriptActivo = false, dur = 0, lastT = 0, seekeando = false, playing = false, avanzando = false;
    let inicioSeg = 0, finSeg = null, inicioAplicado = false, finHabilitado = false, inicioIntentos = 0;

    // El orden marca la PRIORIDAD: EarnVids primero (default), luego StreamWish.
    const SERVIDORES_SOPORTADOS = ["EARNVIDS", "STREAMWISH"];
    const CANALES = ["streamwish", "earnvids"]; // userscripts que hablan con el canal
    function fuenteInicial(cap) {
      for (const srv of SERVIDORES_SOPORTADOS) {
        const i = cap.fuentes.findIndex((f) => (f.servidor || "").toUpperCase() === srv);
        if (i >= 0) return i;
      }
      return 0;
    }
    function estado(m) { $("#estado").textContent = m; }
    function fmt(s) { s = Math.max(0, Math.floor(s || 0)); const m = Math.floor(s / 60); const x = s % 60; return m + ":" + String(x).padStart(2, "0"); }
    function cmd(c, value) { try { iframe.contentWindow.postMessage({ canal: "canal-cmd", cmd: c, value }, "*"); } catch (e) {} }

    // ---- normalizar datos: soporta multi-serie {series:[...]} o serie unica ----
    function normalizar(data) {
      const lista = data.series ? data.series : [data];
      return lista.map((s) => {
        const serie = s.serie || {};
        const caps = [];
        (s.temporadas || []).forEach((t) => (t.capitulos || []).forEach((c) => {
          const fuentes = (c.fuentes || []).filter((f) => (f.idioma || "").toUpperCase() === "LAT");
          if (fuentes.length) caps.push({ temporada: t.numero, capitulo: c.numero, titulo: c.titulo || "", fuentes,
            inicio_seg: c.inicio_seg || 0, fin_seg: (c.fin_seg == null ? null : c.fin_seg) });
        }));
        caps.sort((a, b) => (a.capitulo || 0) - (b.capitulo || 0));
        return { titulo: serie.titulo || "Serie", caps };
      }).filter((s) => s.caps.length);
    }
    async function obtenerDatos() {
      try { const r = await fetch("data.json", { cache: "no-store" }); if (r.ok) return await r.json(); } catch (e) {}
      if (window.CANAL_DATA) return window.CANAL_DATA;
      throw new Error("no se encontraron datos");
    }

    function pintarSelectSeries() {
      const sel = $("#sel-serie"); sel.innerHTML = "";
      series.forEach((s, i) => { const o = document.createElement("option"); o.value = i; o.textContent = s.titulo; sel.appendChild(o); });
      sel.value = idxSerie;
    }
    function pintarCaps(serie) {
      const sel = $("#sel-cap"); sel.innerHTML = "";
      serie.caps.forEach((c, i) => {
        const o = document.createElement("option");
        o.value = i;
        o.textContent = `T${c.temporada} E${c.capitulo}` + (c.titulo ? " · " + c.titulo : "");
        sel.appendChild(o);
      });
    }
    function pintarServidores(cap) {
      const sel = $("#sel-servidor"); sel.innerHTML = "";
      cap.fuentes.forEach((f, i) => { const o = document.createElement("option"); o.value = i; o.textContent = f.servidor; sel.appendChild(o); });
      sel.value = idxFuente;
    }

    function reproducir() {
      const serie = series[idxSerie]; if (!serie) return;
      const cap = serie.caps[idxCap]; if (!cap) return;
      const fuente = cap.fuentes[idxFuente];
      $("#serie").textContent = serie.titulo;
      $("#titulo-top").textContent = serie.titulo + " · T" + cap.temporada + " E" + cap.capitulo + (cap.titulo ? " · " + cap.titulo : "");
      $("#chip-idioma").textContent = fuente.idioma_nombre || "Latino";
      $("#contador").textContent = `Cap ${idxCap + 1}/${serie.caps.length}`;
      $("#sel-cap").value = idxCap;
      $("#b-prev").disabled = idxCap === 0;
      $("#b-next").disabled = idxCap === serie.caps.length - 1;
      pintarServidores(cap);
      inicioSeg = cap.inicio_seg || 0; finSeg = cap.fin_seg; inicioAplicado = (inicioSeg <= 0); finHabilitado = false; inicioIntentos = 0;
      $("#next-banner").classList.remove("mostrar");
      userscriptActivo = false; dur = 0; lastT = 0; avanzando = false; setPlayIcon(false);
      iframe.src = fuente.embed_url;
      estado("Cargando " + fuente.servidor + "…");
      setTimeout(() => {
        $("#aviso").textContent = userscriptActivo ? "" :
          "⚠ No detecté el userscript en este servidor (sin él hay publicidad y no andan los controles). Actualizá el userscript o probá otro servidor.";
      }, 4500);
    }
    function irA(delta) {
      const serie = series[idxSerie];
      const n = idxCap + delta;
      if (n < 0 || n >= serie.caps.length) return;
      idxCap = n; idxFuente = fuenteInicial(serie.caps[n]); reproducir();
    }

    // ---- estado del userscript ----
    function setPlayIcon(p) { playing = p; $("#b-play").textContent = p ? "⏸" : "▶"; }
    window.addEventListener("message", (ev) => {
      const d = ev.data || {}; if (!CANALES.includes(d.canal)) return;
      if (d.tipo === "listo" || d.tipo === "play") {
        userscriptActivo = true; $("#aviso").textContent = ""; estado("Reproduciendo (userscript activo).");
        avanzando = false; // el nuevo capítulo ya arrancó: rehabilita el auto-siguiente
      }
      if (d.tipo === "estado") {
        userscriptActivo = true; setPlayIcon(!!d.playing);
        dur = d.dur || dur; lastT = d.t || 0;
        if (!seekeando && dur) $("#prog").value = (d.t / dur) * 100;
        $("#tiempo").textContent = fmt(d.t) + " / " + fmt(dur);
        $("#b-mute").textContent = d.muted ? "🔇" : "🔊";
        if (!seekeando && !$("#vol").matches(":active")) $("#vol").value = d.muted ? 0 : d.volume;

        // saltar al inicio configurado: reintentamos hasta confirmar la posición
        // (algunos players ignoran el primer seek si todavía no están listos).
        if (!inicioAplicado && inicioSeg > 0 && dur > 0) {
          if (d.t >= inicioSeg - 3) { inicioAplicado = true; }      // ya llegó
          else if (inicioIntentos < 25) { inicioIntentos++; cmd("seek", inicioSeg); }
          else { inicioAplicado = true; }                          // me rindo tras varios intentos
        }
        // fin configurado: >=0 segundo absoluto; <0 = "N seg antes del final"
        let finReal = null;
        if (finSeg != null) finReal = finSeg < 0 ? (dur > 0 ? dur + finSeg : null) : finSeg;
        if (finReal != null) {
          // solo habilitamos el corte DESPUÉS de confirmar que estamos antes del fin
          if (d.t < finReal - 2) finHabilitado = true;
          if (finHabilitado && d.t >= finReal) {
            $("#next-banner").classList.add("mostrar");
            if ($("#auto").checked && !avanzando) { avanzando = true; estado("Pasando al siguiente capítulo…"); irA(1); }
          }
        }
      }
      // fin natural del video (si no hay fin_seg)
      if ((d.tipo === "ended" || d.tipo === "casi-fin") && finSeg == null) {
        if ($("#auto").checked && !avanzando) { avanzando = true; estado("Capítulo terminado, siguiente…"); irA(1); }
      }
    });

    // ---- controles dentro del reproductor ----
    $("#overlay").addEventListener("click", (e) => { if (e.target.id === "overlay") cmd("toggle"); });
    $("#b-play").addEventListener("click", (e) => { e.stopPropagation(); cmd("toggle"); });
    $("#b-back10").addEventListener("click", (e) => { e.stopPropagation(); cmd("seek", Math.max(0, lastT - 10)); });
    $("#b-fwd10").addEventListener("click", (e) => { e.stopPropagation(); cmd("seek", (dur ? Math.min(dur - 1, lastT + 10) : lastT + 10)); });
    $("#b-mute").addEventListener("click", (e) => { e.stopPropagation(); cmd("mute"); });
    $("#vol").addEventListener("input", (e) => { e.stopPropagation(); cmd("volume", parseFloat(e.target.value)); });
    $("#prog").addEventListener("mousedown", () => { seekeando = true; });
    $("#prog").addEventListener("change", (e) => { if (dur) cmd("seek", (parseFloat(e.target.value) / 100) * dur); seekeando = false; });
    $("#b-full").addEventListener("click", (e) => {
      e.stopPropagation();
      if (!document.fullscreenElement) box.requestFullscreen && box.requestFullscreen();
      else document.exitFullscreen && document.exitFullscreen();
    });

    // ---- navegacion (fuera del reproductor) ----
    $("#b-prev").addEventListener("click", () => irA(-1));
    $("#b-next").addEventListener("click", () => irA(1));
    $("#sel-cap").addEventListener("change", (e) => { idxCap = +e.target.value; idxFuente = fuenteInicial(series[idxSerie].caps[idxCap]); reproducir(); });
    $("#sel-servidor").addEventListener("change", (e) => { idxFuente = +e.target.value; reproducir(); });
    $("#sel-serie").addEventListener("change", (e) => { idxSerie = +e.target.value; idxCap = 0; pintarCaps(series[idxSerie]); idxFuente = fuenteInicial(series[idxSerie].caps[0]); reproducir(); });

    // ---- mostrar/ocultar controles con el mouse ----
    let tOcultar;
    function mostrarControles() {
      box.classList.remove("oculto-controles");
      clearTimeout(tOcultar);
      tOcultar = setTimeout(() => { if (playing) box.classList.add("oculto-controles"); }, 3000);
    }
    box.addEventListener("mousemove", mostrarControles);
    box.addEventListener("mouseleave", () => { if (playing) box.classList.add("oculto-controles"); });
    mostrarControles();

    (async function init() {
      try {
        series = normalizar(await obtenerDatos());
        if (!series.length) { estado("No hay series con fuentes en latino."); return; }
        pintarSelectSeries();
        pintarCaps(series[idxSerie]);
        idxFuente = fuenteInicial(series[idxSerie].caps[idxCap]);
        reproducir();
      } catch (e) { estado("No se pudieron cargar los datos. " + e.message); }
    })();
  </script>
</body>
</html>
